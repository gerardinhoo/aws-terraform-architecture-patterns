name: Lambda Task API Terraform Checks

on:
  push:
    branches:
      - main
    paths:
      - 'lambda-task-api/**'
      - '.github/workflows/deploy-lambda-task-api.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'lambda-task-api/**'
      - '.github/workflows/deploy-lambda-task-api.yml'
  workflow_dispatch:

jobs:
  terraform-checks:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lambda-task-api/terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate
